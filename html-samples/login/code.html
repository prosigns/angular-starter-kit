<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>BPDS CareTrack™ | Secure Clinical Access</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                "tertiary-container": "#872d00",
                "outline-variant": "#c4c5d5",
                "on-primary-fixed": "#001453",
                "on-surface-variant": "#444653",
                "surface-variant": "#e0e3e5",
                "outline": "#757684",
                "error": "#ba1a1a",
                "on-secondary-container": "#006f67",
                "surface-tint": "#3755c3",
                "on-secondary": "#ffffff",
                "secondary-fixed": "#9cf2e8",
                "on-primary": "#ffffff",
                "on-background": "#191c1e",
                "surface-bright": "#f7f9fb",
                "surface-container-high": "#e6e8ea",
                "on-surface": "#191c1e",
                "primary-fixed-dim": "#b8c4ff",
                "on-tertiary-container": "#ffa583",
                "on-error-container": "#93000a",
                "tertiary": "#611e00",
                "on-error": "#ffffff",
                "primary-container": "#1e40af",
                "primary": "#00288e",
                "surface-container-highest": "#e0e3e5",
                "on-secondary-fixed": "#00201d",
                "surface-dim": "#d8dadc",
                "on-primary-container": "#a8b8ff",
                "primary-fixed": "#dde1ff",
                "tertiary-fixed-dim": "#ffb59a",
                "surface": "#f7f9fb",
                "secondary": "#006a63",
                "on-tertiary-fixed": "#380d00",
                "inverse-surface": "#2d3133",
                "tertiary-fixed": "#ffdbce",
                "on-primary-fixed-variant": "#173bab",
                "inverse-primary": "#b8c4ff",
                "on-tertiary-fixed-variant": "#802a00",
                "surface-container": "#eceef0",
                "on-secondary-fixed-variant": "#00504a",
                "background": "#f7f9fb",
                "surface-container-low": "#f2f4f6",
                "on-tertiary": "#ffffff",
                "inverse-on-surface": "#eff1f3",
                "error-container": "#ffdad6",
                "secondary-fixed-dim": "#80d5cb",
                "secondary-container": "#99efe5",
                "surface-container-lowest": "#ffffff"
            },
            "borderRadius": {
                "DEFAULT": "0.125rem",
                "lg": "0.25rem",
                "xl": "0.5rem",
                "full": "0.75rem"
            },
            "fontFamily": {
                "headline": ["Inter"],
                "body": ["Inter"],
                "label": ["Inter"]
            }
          }
        }
      }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background min-h-screen flex items-center justify-center p-4">
<!-- Subtle Background Gradient for Canvas -->
<div class="fixed inset-0 z-[-1] bg-gradient-to-br from-[#f7f9fb] via-[#f2f4f6] to-[#e6e8ea]" data-alt="abstract soft gradient background with flowing transitions between slate white and pale blue professional medical aesthetic">
</div>
<!-- Login Container -->
<main class="w-full max-w-[400px] flex flex-col gap-6">
<!-- Header Branding (Outside card for clean editorial look) -->
<header class="flex flex-col items-center text-center gap-3">
<div class="w-10 h-10 bg-primary-container rounded-lg flex items-center justify-center text-white shadow-lg">
<span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1;">analytics</span>
</div>
<div>
<h1 class="text-on-surface font-extrabold text-xl tracking-tight uppercase">BPDS CareTrack™</h1>
<p class="text-on-surface-variant font-medium text-xs tracking-widest uppercase opacity-70">Secure Clinical Access</p>
</div>
</header>
<!-- Main Card -->
<section class="surface-container-lowest shadow-[0_8px_32px_rgba(0,40,142,0.06)] rounded-xl overflow-hidden border border-outline-variant/10">
<!-- Phase 1: Login Credentials -->
<div class="p-8 flex flex-col gap-5">
<div class="space-y-4">
<!-- Email Input -->
<div class="space-y-1">
<label class="text-[0.6875rem] font-bold uppercase tracking-wider text-on-surface-variant flex items-center gap-2">
<span class="material-symbols-outlined text-[14px]">alternate_email</span>
                            Clinical Email
                        </label>
<input class="w-full bg-surface-variant/50 border-none rounded-lg px-4 py-3 text-sm focus:bg-surface-container-lowest focus:ring-1 focus:ring-primary/40 transition-all outline-none" placeholder="name@clinical.org" type="email"/>
</div>
<!-- Password Input -->
<div class="space-y-1">
<div class="flex justify-between items-center">
<label class="text-[0.6875rem] font-bold uppercase tracking-wider text-on-surface-variant flex items-center gap-2">
<span class="material-symbols-outlined text-[14px]">lock</span>
                                Password
                            </label>
<button class="text-[0.6875rem] font-bold text-primary uppercase tracking-wider hover:opacity-70 transition-opacity">Show</button>
</div>
<input class="w-full bg-surface-variant/50 border-none rounded-lg px-4 py-3 text-sm focus:bg-surface-container-lowest focus:ring-1 focus:ring-primary/40 transition-all outline-none" placeholder="••••••••" type="password"/>
</div>
<!-- Remember Me -->
<div class="flex items-center gap-2">
<input class="w-4 h-4 rounded border-outline-variant text-primary focus:ring-primary" id="remember" type="checkbox"/>
<label class="text-xs text-on-surface-variant font-medium" for="remember">Keep me signed in for 12 hours</label>
</div>
</div>
<button class="w-full bg-gradient-to-br from-primary to-primary-container text-white py-3 rounded-lg font-semibold text-sm shadow-md hover:shadow-lg active:scale-[0.98] transition-all">
                    Sign In
                </button>
<div class="text-center">
<a class="text-[0.6875rem] font-bold text-primary uppercase tracking-wider hover:underline" href="#">
                        Forgot Access Credentials?
                    </a>
</div>
</div>
<!-- MFA Section (Integrated Divider) -->
<div class="bg-surface-container-low px-8 py-6 border-t border-outline-variant/10">
<div class="flex flex-col gap-4">
<div class="space-y-1">
<label class="text-[0.6875rem] font-bold uppercase tracking-wider text-on-surface-variant flex items-center gap-2">
<span class="material-symbols-outlined text-[14px]">shield_person</span>
                            MFA Verification Required
                        </label>
<div class="flex justify-between gap-2 mt-2">
<input class="w-11 h-12 text-center bg-surface-container-lowest border border-outline-variant/30 rounded-lg text-lg font-bold focus:ring-1 focus:ring-primary outline-none" maxlength="1" type="text"/>
<input class="w-11 h-12 text-center bg-surface-container-lowest border border-outline-variant/30 rounded-lg text-lg font-bold focus:ring-1 focus:ring-primary outline-none" maxlength="1" type="text"/>
<input class="w-11 h-12 text-center bg-surface-container-lowest border border-outline-variant/30 rounded-lg text-lg font-bold focus:ring-1 focus:ring-primary outline-none" maxlength="1" type="text"/>
<input class="w-11 h-12 text-center bg-surface-container-lowest border border-outline-variant/30 rounded-lg text-lg font-bold focus:ring-1 focus:ring-primary outline-none" maxlength="1" type="text"/>
<input class="w-11 h-12 text-center bg-surface-container-lowest border border-outline-variant/30 rounded-lg text-lg font-bold focus:ring-1 focus:ring-primary outline-none" maxlength="1" type="text"/>
<input class="w-11 h-12 text-center bg-surface-container-lowest border border-outline-variant/30 rounded-lg text-lg font-bold focus:ring-1 focus:ring-primary outline-none" maxlength="1" type="text"/>
</div>
</div>
<button class="w-full bg-secondary-container text-on-secondary-container py-3 rounded-lg font-bold text-xs uppercase tracking-widest hover:bg-secondary-fixed transition-colors">
                        Verify Identity
                    </button>
<div class="flex justify-center items-center gap-1">
<span class="text-[0.6875rem] text-on-surface-variant">Didn't receive a code?</span>
<button class="text-[0.6875rem] font-bold text-primary uppercase tracking-wider hover:opacity-70">Resend code</button>
</div>
</div>
</div>
</section>
<!-- Trust Indicators Footer -->
<footer class="flex flex-col items-center gap-4">
<div class="flex items-center gap-3 px-4 py-2 bg-surface-container/50 rounded-full">
<span class="material-symbols-outlined text-[16px] text-secondary">encrypted</span>
<span class="text-[0.625rem] font-bold uppercase tracking-[0.1em] text-on-surface-variant/80">Protected by HIPAA &amp; 42 CFR Part 2</span>
</div>
<div class="flex gap-6 text-[0.6875rem] uppercase tracking-[0.05em] font-medium text-slate-400">
<a class="hover:text-primary transition-colors" href="#">Security Standards</a>
<a class="hover:text-primary transition-colors" href="#">Privacy Policy</a>
<a class="hover:text-primary transition-colors" href="#">Contact Support</a>
</div>
<p class="text-[0.625rem] uppercase tracking-[0.1em] text-slate-400 opacity-60">
                © 2024 Clinical Architect. High-Density HIPAA Protected Environment.
            </p>
</footer>
</main>
<!-- Background Decorative Elements -->
<div class="fixed bottom-0 right-0 p-12 opacity-5 pointer-events-none">
<span class="material-symbols-outlined text-[240px]" style="font-variation-settings: 'FILL' 1;">health_and_safety</span>
</div>
</body></html>
