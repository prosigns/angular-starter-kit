<div class="dropdown" #dropdown>
  <!-- Standard Label -->
  <div class="space-y-2">
    <label
      *ngIf="label"
      class="block text-sm font-medium text-gray-700"
      [for]="'search-input-' + (config?.endpoint || 'static')"
    >
      {{ label }}
      <span *ngIf="required" class="text-red-500">*</span>
    </label>

    <!-- Search Input Container -->
    <div class="input-wrapper">
      <div
        class="search-container"
        [class.disabled]="disabled"
        [class.error]="errorMessage"
        [class.focused]="isOpen"
      >
        <!-- Search Input -->
        <input
          #searchInput
          [id]="'search-input-' + (config?.endpoint || 'static')"
          type="text"
          class="search-input"
          [placeholder]="config?.searchPlaceholder || placeholder"
          [value]="searchTerm"
          [disabled]="disabled || readonly"
          [readonly]="readonly"
          (input)="onSearchInput($event)"
          (focus)="onSearchFocus()"
          (keydown)="onKeyDown($event)"
          autocomplete="off"
        />

        <!-- Clear Button -->
        <button
          *ngIf="selectedOption && searchTerm && !disabled"
          type="button"
          class="clear-button"
          (click)="clearSelection($event)"
          tabindex="-1"
          aria-label="Clear selection"
        >
          <mat-icon>close</mat-icon>
        </button>

        <!-- Dropdown Arrow -->
        <button
          type="button"
          class="dropdown-arrow"
          [class.rotated]="isOpen"
          (click)="toggleDropdown($event)"
          [disabled]="disabled || readonly"
          tabindex="-1"
        >
          <mat-icon>keyboard_arrow_down</mat-icon>
        </button>
      </div>
    </div>
  </div>

  <!-- Error Message -->
  <div *ngIf="errorMessage" class="error-message">
    {{ errorMessage }}
  </div>

  <!-- Dropdown List -->
  <div
    class="dropdown-list"
    [class.open]="isOpen"
    [class.open-up]="openUp"
    [class.loading]="isLoading"
    [ngStyle]="panelStyle"
  >
    <!-- Loading State -->
    <div *ngIf="isLoading" class="loading-container">
      <mat-spinner diameter="20"></mat-spinner>
      <span class="loading-text">{{ config?.loadingText || 'Loading...' }}</span>
    </div>

    <!-- Options List -->
    <div *ngIf="!isLoading" class="options-container">
      <!-- No Results -->
      <div *ngIf="filteredOptions.length === 0" class="no-results">
        {{ config?.noResultsText || 'No results found' }}
      </div>

      <!-- Options -->
      <div
        *ngFor="let option of filteredOptions; let i = index; trackBy: trackByFn.bind(this)"
        class="option-item"
        [class.highlighted]="i === highlightedIndex"
        [class.selected]="selectedOption && getValue(selectedOption) === getValue(option)"
        [attr.tabindex]="0"
        [attr.role]="'option'"
        [attr.aria-selected]="selectedOption && getValue(selectedOption) === getValue(option)"
        (click)="selectOption(option)"
        (keydown)="onOptionKeyDown($event, option)"
        (mouseenter)="highlightedIndex = i"
      >
        <span class="option-text">{{ getDisplayValue(option) }}</span>
        <mat-icon
          *ngIf="selectedOption && getValue(selectedOption) === getValue(option)"
          class="selected-icon"
          >check</mat-icon
        >
      </div>
    </div>
  </div>
</div>
